name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Normalize git line endings on Windows
        # Without this, actions/checkout honors the runner-global
        # core.autocrlf=true on Windows and converts LF -> CRLF on
        # text files at checkout, which can produce false-positive
        # diffs in `cargo fmt --check` and PUML rendering.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain and components
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy llvm-tools-preview rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml', 'rust/.cargo/config.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        working-directory: rust
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: rust
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: rust
        run: cargo test --locked --all-targets

      - name: Run Rust doctests
        # `--all-targets` above skips doctests, so run them explicitly. This
        # compiles the README library example (included via include_str! in
        # src/lib.rs) so it cannot silently rot.
        working-directory: rust
        run: cargo test --locked --doc

      - name: Install cargo-llvm-cov
        # Coverage gate runs only on Linux — coverage isn't platform-
        # dependent so the Windows cell would just duplicate work.
        # Windows builds remain functional smoke for path / line-ending
        # portability bugs.
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6
          fallback: none

      - name: Enforce Rust coverage gate
        if: runner.os == 'Linux'
        working-directory: rust
        run: cargo cov-ci --locked

      - name: Generate Rust LCOV report
        if: runner.os == 'Linux'
        working-directory: rust
        run: cargo cov-lcov --locked

      - name: Upload Rust LCOV report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: rust-lcov
          path: rust/lcov.info
          if-no-files-found: error

  rust-doc:
    name: Rust docs (rustdoc -D warnings)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-doc-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml', 'rust/.cargo/config.toml') }}
          restore-keys: |
            cargo-doc-${{ runner.os }}-

      - name: Build docs with warnings denied
        # Catches broken intra-doc links and other rustdoc lints in the
        # doc-heavy crate. --no-deps documents only this crate (not memmap2).
        working-directory: rust
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --locked

  rust-msrv:
    name: Rust MSRV (1.88)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install MSRV toolchain (1.88)
        # The main `rust` job builds on stable, which would silently accept a
        # newer-than-MSRV std/language feature. This job pins the declared
        # rust-version (Cargo.toml) so the MSRV claim is actually enforced.
        shell: bash
        run: |
          rustup toolchain install 1.88 --profile minimal --no-self-update
          rustup default 1.88

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-msrv-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml', 'rust/.cargo/config.toml') }}
          restore-keys: |
            cargo-msrv-${{ runner.os }}-

      - name: Check on MSRV (1.88)
        working-directory: rust
        run: cargo check --locked --all-targets

  cargo-deny:
    name: Rust supply chain (cargo-deny)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run cargo-deny
        # Checks advisories (RustSec), licenses, bans, and sources against
        # rust/deny.toml. The action installs cargo-deny and fetches a fresh
        # advisory DB, so a newly-published advisory on a dependency fails CI.
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml
          command: check

  cargo-semver-checks:
    name: Rust SemVer (cargo-semver-checks)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history + tags so the baseline tag resolves

      - name: Determine baseline (latest release tag)
        id: baseline
        shell: bash
        run: echo "rev=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Run cargo-semver-checks
        # Compares the crate's public API against the latest release tag and
        # fails on a breaking change. release-type: minor lets additive changes
        # pass (the crate version is static between releases here), so only a
        # major/breaking API change without a major bump blocks the merge.
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: rust/Cargo.toml
          baseline-rev: ${{ steps.baseline.outputs.rev }}
          release-type: minor

  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full version matrix on Linux (production target).
          - { os: ubuntu-latest,  python-version: "3.10" }
          - { os: ubuntu-latest,  python-version: "3.11" }
          - { os: ubuntu-latest,  python-version: "3.12" }
          - { os: ubuntu-latest,  python-version: "3.13" }
          - { os: ubuntu-latest,  python-version: "3.14" }
          # Cross-platform smoke on Windows: the current support pin
          # (3.12, used for build / poetry check --lock / conformance)
          # plus the latest supported version (3.14). Catches path,
          # encoding, and line-ending issues that don't surface on
          # Linux without ballooning the matrix.
          - { os: windows-latest, python-version: "3.12" }
          - { os: windows-latest, python-version: "3.14" }

    steps:
      - name: Normalize git line endings on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Display tool versions
        shell: bash
        run: |
          python --version
          poetry --version

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run Python tests
        run: poetry -C python run pytest

      - name: Validate Python package metadata and lockfile
        # Lockfile + metadata validation and the dist build only need
        # to run once. Keep them on the Linux 3.12 cell — that pin
        # mirrors the pre-existing single-cell behavior.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: poetry -C python check --strict --lock

      - name: Build Python package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        working-directory: python
        run: poetry build

  python-coverage:
    name: Python coverage gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Enforce Python coverage gate
        # Coverage gate runs once on Linux/3.12 — coverage isn't
        # platform- or interpreter-dependent, so running it across the
        # full python-job matrix would waste CI minutes. Mirrors how
        # cargo cov-ci is invoked only on the Linux cell of the Rust
        # job. The floor (88% combined line+branch) is `fail_under` in
        # python/pyproject.toml's [tool.coverage.report] — see the comment
        # block there for the ratchet rationale.
        run: poetry -C python run pytest --cov --cov-report=term-missing

  mypy:
    name: Python type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run mypy (strict)
        # mypy analyzes the package as python_version 3.10 (set in
        # python/pyproject.toml [tool.mypy]) regardless of the running
        # interpreter, so a single cell is sufficient — same rationale as
        # the coverage gate. working-directory: python so mypy picks up the
        # [tool.mypy] config and `src` resolves to the package source.
        working-directory: python
        run: poetry run mypy src

  pylint:
    name: Python lint (pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run pylint
        # Lints the package source (src/mie_decoder). The config — curated
        # disables (lazy imports, the too-many-* family already covered by
        # SonarCloud, etc.) and max-line-length — lives in
        # python/pyproject.toml's [tool.pylint.*]. working-directory: python so
        # pylint picks up that config and resolves the package's imports. The
        # gate fails on any message (pylint exits non-zero below 10/10).
        working-directory: python
        run: poetry run pylint src/mie_decoder

  ruff:
    name: Python lint + format (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run ruff check
        # Lints the package source + tests (config in python/pyproject.toml
        # [tool.ruff]). working-directory: python so ruff picks up the config.
        working-directory: python
        run: poetry run ruff check

      - name: Run ruff format --check
        # Verifies the package + tests are ruff-formatted (Black-style, line
        # length 100 to match the pylint gate). Run `ruff format` to fix.
        working-directory: python
        run: poetry run ruff format --check

  vulture:
    name: Python dead code (vulture)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run vulture
        # Finds unused (dead) code across the package + tests. Scan paths and
        # intentional-name ignores (interface args, documented constants) are in
        # python/pyproject.toml [tool.vulture]. Exits non-zero on any finding.
        working-directory: python
        run: poetry run vulture

  bandit:
    name: Python security (bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run bandit
        # Security static analysis (SAST) over the package source. Scans
        # src/mie_decoder only — not tests, whose asserts bandit's B101 would
        # flag. Exits non-zero on any finding at the default severity/confidence.
        working-directory: python
        run: poetry run bandit -r src/mie_decoder

  conformance:
    name: Rust/Python conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Normalize git line endings on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install mie-decoder and runtime dependencies
        # The conformance job runs both CLIs and diffs CSV output. It
        # does not need Poetry-locked dependency versions — only the
        # mie-decoder package and its declared runtime deps available
        # to `python -m mie_decoder`. Installing directly into the
        # actions/setup-python interpreter with pip is the simplest
        # form that works the same way on every hosted runner.
        run: python -m pip install -e ./python

      - name: Verify mie_decoder is importable
        run: python -c "import mie_decoder; print('mie_decoder at:', mie_decoder.__file__)"

      - name: Run cross-implementation conformance suite
        # run.py already handles the .exe suffix on Windows when
        # locating rust/target/debug/mie-decoder, so the same invocation
        # works on both runners.
        run: python tests/conformance/run.py

  trace-matrix:
    name: Requirements trace matrix
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify TRACE-MATRIX.md is up to date
        run: python scripts/build-trace-matrix.py --check

  diagrams:
    name: Diagrams (PUML / SVG drift)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install graphviz
        # PlantUML uses Graphviz `dot` to lay out diagrams that don't
        # declare `!pragma layout smetana`. dataflow.puml falls into
        # this category, so graphviz is required for full rendering.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends graphviz

      - name: Download pinned PlantUML jar
        env:
          # Pin to the same PlantUML version that produced the
          # committed SVGs (see <?plantuml ...?> processing
          # instruction inside docs/diagrams/class.svg). Bumping
          # this version typically reflows diagrams and requires a
          # matching local re-render + commit.
          PLANTUML_VERSION: 1.2026.5
        run: |
          mkdir -p "$HOME/plantuml"
          curl -fsSL --retry 3 -o "$HOME/plantuml/plantuml.jar" \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"
          echo "PLANTUML_JAR=$HOME/plantuml/plantuml.jar" >> "$GITHUB_ENV"

      - name: Re-render PUML sources to SVG
        run: |
          java -Djava.awt.headless=true -jar "$PLANTUML_JAR" \
            -tsvg -o "$PWD/docs/diagrams" docs/diagrams/*.puml

      - name: Verify committed SVGs match rendered output
        run: |
          if ! git diff --exit-code -- docs/diagrams/*.svg; then
            echo "::error::Committed docs/diagrams/*.svg are stale relative to the *.puml sources."
            echo "::error::Regenerate locally with: plantuml -tsvg docs/diagrams/*.puml"
            echo "::error::Then commit both the *.puml change and the regenerated *.svg in the same commit"
            echo "::error::(MAINTAINER-GUIDE.md section 3)."
            exit 1
          fi
