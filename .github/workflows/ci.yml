name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain and components
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy llvm-tools-preview rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked --all-targets

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6
          fallback: none

      - name: Enforce Rust coverage gate
        run: cargo cov-ci --locked

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Display tool versions
        run: |
          python --version
          poetry --version

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      - name: Run Python tests
        run: poetry -C python run pytest

      - name: Validate Python package metadata and lockfile
        if: matrix.python-version == '3.12'
        run: poetry -C python check --strict --lock

      - name: Build Python package
        if: matrix.python-version == '3.12'
        working-directory: python
        run: poetry build

  conformance:
    name: Rust/Python conformance
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install mie-decoder and runtime dependencies
        # The conformance job runs both CLIs and diffs CSV output. It
        # does not need Poetry-locked dependency versions — only the
        # mie-decoder package and its declared runtime deps available
        # to `python -m mie_decoder`. Installing directly into the
        # actions/setup-python interpreter with pip is the simplest
        # form that works the same way on every hosted runner.
        run: python -m pip install -e ./python

      - name: Verify mie_decoder is importable
        run: python -c "import mie_decoder; print('mie_decoder at:', mie_decoder.__file__)"

      - name: Run cross-implementation conformance suite
        run: python tests/conformance/run.py

  trace-matrix:
    name: Requirements trace matrix
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify TRACE-MATRIX.md is up to date
        run: python scripts/build-trace-matrix.py --check
