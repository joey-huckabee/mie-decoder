name: Fuzz burn-in

# Longer-running fuzz burn-in for the L1-ROB-001 no-panic harnesses. The
# normal CI suite runs the fixed 256-iteration default (kept fast); this
# scheduled job overrides MIE_FUZZ_ITERATIONS for a much deeper sweep. The
# PRNG is deterministic, so a burn-in is a strict superset of the default
# run (same first 256 iterations) and a failure is reproducible from the
# printed seed against either implementation.

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Fuzz iterations per implementation"
        default: "25000"
      stream_logs:
        description: "Stream harness WARN/ERROR diagnostics live (cargo --nocapture / pytest -s)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz-rust:
    name: Rust fuzz burn-in
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      MIE_FUZZ_ITERATIONS: ${{ github.event.inputs.iterations || '25000' }}
      # Empty on the scheduled run (capture on → small logs); `--nocapture`
      # only when a manual run ticks `stream_logs`.
      NOCAPTURE: ${{ github.event.inputs.stream_logs == 'true' && '--nocapture' || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable

      # Both L1-ROB-001 harnesses run as separate steps so the Actions UI
      # shows pass/fail per harness. With `stream_logs` ticked, $NOCAPTURE is
      # `--nocapture` and each harness's logger diagnostics (reader:
      # sync/invariant WARNs; dump: scan-stop anomaly WARNs, L2-CLI-013) stream
      # live; otherwise output is captured and shown only on failure.
      - name: Reader fuzz harness (burn-in)
        working-directory: rust
        run: cargo test --locked --test integration fuzz_arbitrary_bytes_never_panic -- $NOCAPTURE

      - name: Dump fuzz harness (burn-in)
        working-directory: rust
        run: cargo test --locked --test integration dump_arbitrary_bytes_never_panics -- $NOCAPTURE

  fuzz-python:
    name: Python fuzz burn-in
    runs-on: ubuntu-latest
    env:
      MIE_FUZZ_ITERATIONS: ${{ github.event.inputs.iterations || '25000' }}
      # Empty on the scheduled run (pytest captures → small logs); `-s` only
      # when a manual run ticks `stream_logs`.
      PYTEST_STREAM: ${{ github.event.inputs.stream_logs == 'true' && '-s' || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: python/poetry.lock

      - name: Synchronize locked dependencies
        run: poetry -C python sync --no-interaction --no-ansi

      # The TestFuzzHarness class runs both the reader and dump harnesses.
      # When `stream_logs` is ticked, $PYTEST_STREAM is `-s` (capture off) so
      # the harnesses' `mie_decoder` WARN/ERROR diagnostics stream live into
      # the job log, matching the Rust job's `--nocapture`; otherwise pytest
      # captures and shows them only on failure.
      - name: Run the L1-ROB-001 fuzz harnesses (burn-in)
        run: poetry -C python run pytest tests/test_e2e.py::TestFuzzHarness -v $PYTEST_STREAM
